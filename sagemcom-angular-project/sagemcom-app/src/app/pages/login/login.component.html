<div class="login-page">
  <!-- Background geometry -->
  <div class="bg-layer">
    <div class="geo geo-1"></div>
    <div class="geo geo-2"></div>
    <div class="geo geo-3"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="login-wrapper">

    <!-- Left panel: branding -->
    <div class="brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <div class="logo-mark">
            <span class="logo-s">S</span>
          </div>
          <span class="logo-text">SAGEMCOM</span>
        </div>
        <div class="brand-tagline">
          <h1>Connecting <em>tomorrow</em>,<br>today.</h1>
          <p>Secure access to your enterprise workspace. Manage operations with precision and control.</p>
        </div>
        <div class="brand-stats">
          <div class="stat">
            <span class="stat-num">150+</span>
            <span class="stat-label">Countries</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num">40M+</span>
            <span class="stat-label">Devices</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num">3000+</span>
            <span class="stat-label">Engineers</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="form-panel">
      <div class="form-card">

        <div class="form-header">
          <div class="form-eyebrow">EMPLOYEE PORTAL</div>
          <h2>Welcome back</h2>
          <p>Sign in to access your workspace</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="login-form" autocomplete="off">

          <div class="field-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input
                [(ngModel)]="email"
                name="email"
                id="email"
                type="email"
                placeholder="you@sagemcom.com"
                required
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field-group">
            <label for="password">
              Password
              <a href="#" class="forgot-link">Forgot password?</a>
            </label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input
                [(ngModel)]="password"
                name="password"
                id="password"
                type="password"
                placeholder="••••••••••"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <div *ngIf="error" class="error-alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
          </div>

          <button type="submit" class="login-btn">
            <span>Sign In</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>

        </form>

        <div class="form-footer">
          <span>New to Sagemcom?</span>
          <button (click)="goToRegister()" class="register-link">Request Access →</button>
        </div>

        <div class="security-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4z"/>
          </svg>
          <span>256-bit TLS encryption</span>
        </div>

      </div>
    </div>

  </div>
</div>
